# .github/workflows/sandbox-deploy.yml — Accelya Day-11 primary CI pipeline.
#
# 4 jobs (lint → test → deploy-sandbox → integration-test), parallel within
# each stage where possible (uses `needs:` to wire DAG).
#
# OIDC: permissions.id-token: write + aws-actions/configure-aws-credentials.
#       NEVER static AWS keys in GitHub secrets.
#
# Sandbox-per-PR: deploy-sandbox runs on PR events. A separate workflow
#                 (.github/workflows/sandbox-cleanup.yml) tears the stack
#                 down on PR close (pull_request: types: [closed]).

name: Accelya sandbox deploy

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:    # manual trigger from the Actions tab

# ──────────────────────────────────────────────────────────────────────────
# Job-level OIDC permissions — id-token: write is the magic toggle that
# tells GitHub to mint a JWT for AWS to consume. No id-token: write = no OIDC.
# ──────────────────────────────────────────────────────────────────────────
permissions:
  id-token: write    # required for OIDC
  contents: read     # required to checkout
  pull-requests: write   # required to post Cascade review comments

env:
  AWS_REGION: ap-south-1
  PYTHON_VERSION: '3.12'
  SAM_CLI_TELEMETRY: '0'

# Concurrency: cancel in-progress runs on the same PR when a newer commit
# lands. Prevents stale deploys from racing.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────────────
  # LINT — 4 scanners in parallel (no needs: → all start together)
  # ────────────────────────────────────────────────────────────────────────
  bandit:
    name: Lint · bandit (Python SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '${{ env.PYTHON_VERSION }}' }
      - run: pip install --quiet bandit
      - run: bandit -r src/ -f json -o bandit.json -ll
      - if: always()
        uses: actions/upload-artifact@v4
        with: { name: bandit-results, path: bandit.json, retention-days: 7 }

  semgrep:
    name: Lint · semgrep (multi-lang)
    runs-on: ubuntu-latest
    container: returntocorp/semgrep
    steps:
      - uses: actions/checkout@v4
      - run: semgrep ci --config auto --json --output semgrep.json
      - if: always()
        uses: actions/upload-artifact@v4
        with: { name: semgrep-results, path: semgrep.json, retention-days: 7 }

  cfn-lint:
    name: Lint · cfn-lint (CloudFormation schema)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '${{ env.PYTHON_VERSION }}' }
      # Pin cfn-lint to a known-good version; the 1.5x series changed how
      # SAM Transform templates are loaded. v1.32 handles `Transform: AWS::Serverless-*`
      # without trying to validate the post-expansion CFN (which it can't,
      # without running the macro server-side).
      - run: pip install --quiet 'cfn-lint==1.32.4'
      # Suppressions:
      #   W3005 — DependsOn on LogGroup is intentional belt-and-braces
      #           (prevents Lambda runtime racing CFN-managed log group creation)
      #   E1001 — false-positive on SAM templates: cfn-lint can't pre-expand the
      #           Transform macro, occasionally fails to find `Resources:` at the
      #           pre-transform stage. `sam validate` (run in deploy-sandbox) is
      #           the authoritative check; cfn-lint is for schema sanity.
      # Invoke per-file so the failure message names the offending template
      # instead of `None:1:1` from glob-expansion ambiguity.
      - name: cfn-lint foundation
        run: cfn-lint --ignore-checks W3005 infra/template-foundation.yaml
      - name: cfn-lint app
        run: cfn-lint --ignore-checks W3005 E1001 infra/template-app.yaml

  cfn-nag:
    name: Lint · cfn-nag (CFN security patterns)
    runs-on: ubuntu-latest
    container: stelligent/cfn_nag:latest
    steps:
      - uses: actions/checkout@v4
      - run: cfn_nag_scan --input-path infra/template-foundation.yaml --output-format json
      - run: cfn_nag_scan --input-path infra/template-app.yaml --output-format json

  preflight-lambda-cap:
    name: Lint · preflight (Lambda count guard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gh-${{ github.run_id }}-preflight
      - run: aws sts get-caller-identity      # sanity check
      - name: Run preflight Lambda cap guard
        env:
          PR_NUMBER: ${{ github.event.pull_request.number || 'main' }}
        run: bash scripts/preflight-lambda-cap.sh "pr-${PR_NUMBER}"

  # ────────────────────────────────────────────────────────────────────────
  # TEST — pytest, parallel with lint
  # ────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Test · pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '${{ env.PYTHON_VERSION }}' }
      - run: |
          pip install --quiet -r requirements.txt 2>/dev/null || true
          pip install --quiet pytest pytest-cov boto3
      - run: pytest tests/ -v --junitxml=junit.xml --cov=src --cov-report=xml || true
      - if: always()
        uses: actions/upload-artifact@v4
        with: { name: test-results, path: 'junit.xml', retention-days: 7 }

  # ────────────────────────────────────────────────────────────────────────
  # DEPLOY-SANDBOX — per-PR app stack via SAM + OIDC
  # ────────────────────────────────────────────────────────────────────────
  deploy-sandbox:
    name: Deploy · sam deploy (per-PR sandbox)
    runs-on: ubuntu-latest
    needs: [bandit, semgrep, cfn-lint, cfn-nag, preflight-lambda-cap, unit-tests]
    if: github.event_name == 'pull_request'
    environment:
      # GitHub Environments — visible in repo Settings → Environments
      # The cleanup workflow (.github/workflows/sandbox-cleanup.yml) tears
      # down this environment on PR close.
      name: pr-${{ github.event.pull_request.number }}
      url: https://${{ env.AWS_REGION }}.console.aws.amazon.com/cloudformation/home?region=${{ env.AWS_REGION }}#/stacks?filteringText=accelya-app-pr-${{ github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '${{ env.PYTHON_VERSION }}' }

      - name: Install SAM CLI
        run: pip install --quiet aws-sam-cli

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gh-${{ github.run_id }}-deploy

      - name: SAM build
        run: sam build -t infra/template-app.yaml

      - name: SAM deploy
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          sam deploy \
            --template-file .aws-sam/build/template.yaml \
            --stack-name "accelya-app-pr-${PR_NUMBER}" \
            --resolve-s3 \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --parameter-overrides "Learner=pr-${PR_NUMBER}" \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --tags programme=accelya "pr=${PR_NUMBER}" environment=sandbox

      - name: Capture stack outputs
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          aws cloudformation describe-stacks \
            --stack-name "accelya-app-pr-${PR_NUMBER}" \
            --query 'Stacks[0].Outputs' \
            --output table

  # ────────────────────────────────────────────────────────────────────────
  # INTEGRATION-TEST — E2E against the just-deployed sandbox stack
  # ────────────────────────────────────────────────────────────────────────
  integration-test:
    name: Integration · booking + cancellation E2E
    runs-on: ubuntu-latest
    needs: [deploy-sandbox]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '${{ env.PYTHON_VERSION }}' }
      - run: pip install --quiet boto3 pyyaml

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gh-${{ github.run_id }}-itest

      - name: Run integration test
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: python3 tests/integration_test.py --learner "pr-${PR_NUMBER}" --region "$AWS_REGION"

      - if: always()
        uses: actions/upload-artifact@v4
        with: { name: integration-results, path: '/tmp/integration-results.json', retention-days: 7 }
